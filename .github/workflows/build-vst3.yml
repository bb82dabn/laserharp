name: Build VST3

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2022]
    env:
      PLUGIN_NAME: LaserHarp
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config zip \
            libasound2-dev libjack-jackd2-dev ladspa-sdk \
            libcurl4-openssl-dev libfreetype6-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev libgl1-mesa-dev \
            libglu1-mesa-dev mesa-common-dev libgtk-3-dev
      - name: Configure Linux
        if: runner.os == 'Linux'
        run: cmake -S plugin -B plugin/build -G Ninja -DCMAKE_BUILD_TYPE=Release -DJUCE_BUILD_EXAMPLES=OFF -DJUCE_BUILD_EXTRAS=OFF
      - name: Configure Windows
        if: runner.os == 'Windows'
        run: cmake -S plugin -B plugin/build -G "Visual Studio 17 2022" -A x64 -DJUCE_BUILD_EXAMPLES=OFF -DJUCE_BUILD_EXTRAS=OFF
      - name: Build
        run: cmake --build plugin/build --config Release
      - name: Package Linux VST3
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          found="$(find plugin/build -name '*.vst3' -print -quit)"
          if [ -z "$found" ]; then find plugin/build -maxdepth 6 -print; exit 1; fi
          cp -R "$found" dist/
          tar -czf "${PLUGIN_NAME}-Linux-VST3.tar.gz" -C dist .
      - name: Package Windows VST3
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $found = Get-ChildItem -Path plugin/build -Recurse -Filter *.vst3 | Select-Object -First 1
          if (-not $found) { Get-ChildItem -Path plugin/build -Recurse | Select-Object -First 200; exit 1 }
          Copy-Item -Path $found.FullName -Destination dist -Recurse -Force
          Compress-Archive -Path dist\* -DestinationPath "$env:PLUGIN_NAME-Windows-VST3.zip" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-${{ runner.os }}-VST3
          path: |
            *.tar.gz
            *.zip
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
